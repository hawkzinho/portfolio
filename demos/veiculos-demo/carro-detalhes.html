<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes | AutoGest Demo</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <i data-lucide="menu" style="width:18px;height:18px"></i>
        </button>
        <a href="carros.html" class="back-link" style="margin:0">
          <i data-lucide="arrow-left" style="width:14px;height:14px"></i> Voltar
        </a>
        <span class="topbar-title" id="pageTitle">Detalhes do Carro</span>
      </div>
      <div class="topbar-right" id="carroStatus"></div>
    </div>
    <div class="content">
      <div class="table-card" style="margin-bottom:20px">
        <div class="table-header">
          <h3>Informações do Veículo</h3>
          <a href="#" id="btnChecklist" class="btn btn-secondary btn-sm">
            <i data-lucide="clipboard-list" style="width:14px;height:14px"></i> Checklist
          </a>
        </div>
        <div style="padding:20px" id="carroInfo">
          <div class="loading"><div class="spinner"></div> Carregando...</div>
        </div>
      </div>
      <div class="table-card">
        <div class="table-header">
          <h3>Despesas do Carro</h3>
          <button class="btn btn-primary btn-sm" id="btnAddDespesa">
            <i data-lucide="plus" style="width:14px;height:14px"></i> Adicionar
          </button>
        </div>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>Descrição</th>
                <th>Valor</th>
                <th>Data</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="despesasBody">
              <tr><td colspan="3"><div class="loading"><div class="spinner"></div> Carregando...</div></td></tr>
            </tbody>
            <tfoot>
              <tr>
                <td><strong>Total</strong></td>
                <td class="currency" id="despesasTotal">--</td>
                <td></td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script src="app.js"></script>
<script src="carro-detalhes.js"></script>
</body>
</html>
